  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #0d1b2a;
      --sepia:     #2c4a6e;
      --paper:     #e8f0f7;
      --parchment: #d4e4f0;
      --cream:     #f0f6fb;
      --rule:      #7aaac8;
      --gold:      #3a7bbf;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.7;
    }

    header {
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      padding: 36px 24px 28px;
      border-bottom: 4px solid var(--gold);
    }

    .header-kicker {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rule);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      line-height: 1.2;
      color: var(--paper);
      margin-bottom: 8px;
    }

    header p {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--rule);
    }

    .back-link {
      display: block;
      text-align: center;
      padding: 14px;
      background: var(--parchment);
      border-bottom: 1px solid var(--rule);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      text-decoration: none;
    }
    .back-link:hover { background: var(--ink); color: var(--paper); }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .continent-block {
      margin-bottom: 52px;
    }

    .continent-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gold);
    }

    .continent-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--rule);
    }

    .continent-header h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.03em;
      flex: 1;
    }

    .continent-count {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .location-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0;
      border-top: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
    }

    .location-item {
      padding: 9px 14px;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.95rem;
      color: var(--sepia);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .location-item:hover {
      background: var(--parchment);
      color: var(--ink);
    }

    .location-item::before {
      content: '·';
      color: var(--gold);
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    footer {
      background: var(--ink);
      color: var(--rule);
      text-align: center;
      padding: 24px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    @media (max-width: 480px) {
      .location-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

  const main = document.getElementById('locaties');

  for (const [continent, locs] of Object.entries(grouped)) {
    const color = continentColors[continent] || '#1565c0';
    const block = document.createElement('div');
    block.className = 'continent-block';
