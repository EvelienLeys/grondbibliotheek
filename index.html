<meta charset="UTF-8">

<title>Wereldkaart – Reisherinneringen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1208;
    --parchment: #f5eed8;
    --gold: #c8943a;
    --rust: #8b3a1a;
    --moss: #3d5c2a;
    --sea: #2a4a6b;
    --cream: #faf6e8;
  }

  body {
    background: var(--parchment);
    font-family: 'Crimson Pro', serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    background: linear-gradient(to bottom, #e8dfc0, var(--parchment));
    border-bottom: 2px solid var(--gold);
    position: relative;
  }

  header::before, header::after {
    content: '✦';
    color: var(--gold);
    font-size: 1.2rem;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  header::before { left: 2rem; }
  header::after { right: 2rem; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    color: var(--sea);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .subtitle {
    font-style: italic;
    color: var(--rust);
    font-size: 1.1rem;
    margin-top: 0.3rem;
  }

  #stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0.6rem;
    background: var(--sea);
    color: var(--cream);
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #stats span { font-weight: 300; }
  #stats strong { color: var(--gold); }

  #map-container {
    position: relative;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem;
  }

  #map-svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.15));
    border: 2px solid var(--gold);
    border-radius: 4px;
    background: #d4e8f0;
  }

  .land { fill: #c8c89a; stroke: #a09060; stroke-width: 0.3; }
  .water { fill: #b8d4e8; }

  .pin {
    cursor: pointer;
  }

  .pin .hit-area {
    fill: transparent;
    stroke: none;
  }

  .pin .dot {
    fill: var(--rust);
    stroke: var(--gold);
    stroke-width: 1.2;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
    transition: r 0.15s;
  }

  .pin:hover .dot { r: 6; }

  .pin.africa .dot { fill: #8b3a1a; }
  .pin.asia .dot { fill: #3d5c2a; }
  .pin.europe .dot { fill: #2a4a6b; }
  .pin.americas .dot { fill: #6b2a7a; }
  .pin.oceania .dot { fill: #c8943a; }

  #tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--cream);
    padding: 0.8rem 1.2rem;
    border-radius: 4px;
    font-size: 1rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1000;
    border-left: 3px solid var(--gold);
    max-width: 280px;
    min-width: 160px;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #tooltip.visible { opacity: 1; }
  #tooltip .tt-place { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
  #tooltip .tt-country { font-weight: 300; font-size: 0.82rem; color: #ccc; margin-top: 0.1rem; }
  #tooltip .tt-note { font-style: italic; font-size: 0.8rem; color: #aaa; margin-top: 0.2rem; }
  #tooltip .tt-date { font-size: 0.78rem; color: #aaa; }

  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    padding: 0.8rem 1rem;
    background: var(--cream);
    border-top: 1px solid var(--gold);
    font-size: 0.85rem;
  }

  .leg-item { display: flex; align-items: center; gap: 0.4rem; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--gold); }
  .leg-af { background: #8b3a1a; }
  .leg-as { background: #3d5c2a; }
  .leg-eu { background: #2a4a6b; }
  .leg-am { background: #6b2a7a; }
  .leg-oc { background: #c8943a; }
</style>
</head>

// Convert lat/lon to SVG coordinates (Mercator-ish projection for this map)
function project(lat, lon) {
  // Map: viewBox 0 0 1000 500
  // Longitude: -180 to 180 -> 0 to 1000
  // Latitude: 85 to -60 (flipped) -> 0 to 500
  const x = (lon + 180) / 360 * 1000;
  const latRad = lat * Math.PI / 180;
  const mercN = Math.log(Math.tan((Math.PI / 4) + (latRad / 2)));
  const y = (500 / 2) - (500 * mercN / (2 * Math.PI * 1.3));
  return [x, y];
}

const pinsLayer = document.getElementById('pins-layer');
const tooltip = document.getElementById('tooltip');
let totalCount = 0;

locations.forEach(loc => {
  const [id, country, place, date, note, continent, lat, lon] = loc;
  const [x, y] = project(lat, lon);
  totalCount++;

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', `pin ${continent}`);
  g.setAttribute('transform', `translate(${x},${y})`);
  g.style.cursor = 'pointer';

  // Invisible large hit area for easy hovering
  const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  hitArea.setAttribute('r', '10');
  hitArea.setAttribute('cx', '0');
  hitArea.setAttribute('cy', '0');
  hitArea.setAttribute('class', 'hit-area');
  g.appendChild(hitArea);

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', '3.5');
  circle.setAttribute('cx', '0');
  circle.setAttribute('cy', '0');
  circle.setAttribute('class', 'dot');
  g.appendChild(circle);

  function showTooltip(clientX, clientY) {
    let html = `<div class="tt-place">${place}</div>`;
    html += `<div class="tt-country">${country}</div>`;
    if (date) html += `<div class="tt-date"> ${date}</div>`;
    if (note) html += `<div class="tt-note">✦ ${note}</div>`;
    tooltip.innerHTML = html;
    tooltip.classList.add('visible');
    positionTooltip(clientX, clientY);
  }

  function positionTooltip(clientX, clientY) {
    const margin = 16;
    const ttW = 270, ttH = 110;
    let tx = clientX + margin;
    let ty = clientY + margin;
    if (tx + ttW > window.innerWidth) tx = clientX - ttW - margin;
    if (ty + ttH > window.innerHeight) ty = clientY - ttH - margin;
    if (tx < 8) tx = 8;
    if (ty < 8) ty = 8;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  }

  // Mouse events (desktop)
  g.addEventListener('mouseenter', (e) => showTooltip(e.clientX, e.clientY));
  g.addEventListener('mousemove', (e) => positionTooltip(e.clientX, e.clientY));
  g.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

  // Touch events (iPhone / iPad)
  g.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const t = e.touches[0];
    showTooltip(t.clientX, t.clientY);
  }, { passive: false });

  pinsLayer.appendChild(g);
});

document.getElementById('total-count').textContent = totalCount;

// Tap anywhere else on mobile to close tooltip
document.addEventListener('touchstart', (e) => {
  if (!e.target.closest('#pins-layer')) {
    tooltip.classList.remove('visible');
  }
});
</script>
